<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#1e7e1e;--gl:#2da82d;--b:#1560a0;--bk:#111;--tx:#1a1a1a;--mu:#666;--r:14px}
body{font-family:Inter,sans-serif;background:#f0f2f0;color:var(--tx)}
.hd{background:var(--g);padding:10px 24px}
.hd-in{max-width:1000px;margin:0 auto;display:flex;align-items:center;gap:16px}
.hd h1{font-size:20px;font-weight:800;color:#fff}
.hd p{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
.stripe{height:4px;background:var(--bk)}
.afil{background:#f0f7f0;border-bottom:1px solid #c8e6c8;padding:8px 0;font-size:12px;color:#2a6b2a;font-weight:600}
.afil a{color:var(--g);text-decoration:none;font-weight:500}
.tw{background:var(--bk);position:sticky;top:0;z-index:10;overflow-x:auto}
.tabs{max-width:1000px;margin:0 auto;display:flex;padding:0 16px}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.5);font:700 11px Inter,sans-serif;letter-spacing:.07em;text-transform:uppercase;padding:12px 14px;cursor:pointer;white-space:nowrap}
.tab:hover{color:#fff}
.tab.on{color:#fff;border-bottom-color:var(--gl)}
.page{max-width:1000px;margin:0 auto;padding:28px 16px 56px}
.sec{margin-bottom:40px}
.sec-t{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--g);border-bottom:2px solid var(--g);padding-bottom:8px;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.card{height:280px;perspective:800px;cursor:pointer}
.card-in{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s ease}
.card.flip .card-in{transform:rotateY(180deg)}
.front,.back{position:absolute;inset:0;border-radius:var(--r);backface-visibility:hidden;overflow:hidden;border:.5px solid #ddd}
.front{background:#fff;display:flex;flex-direction:column}
.card:hover .front{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#bbb}
.ph{height:148px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center;gap:4px;flex-shrink:0}
.ph.green{background:#1e7e1e}.ph.blue{background:#1560a0}.ph.teal{background:#0d6e6e}
.ph.plum{background:#5a2d82}.ph.navy{background:#1a2e5a}.ph.terra{background:#7a3410}
.ph-pre{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.1em;text-transform:uppercase}
.ph-name{font-size:13px;font-weight:800;color:#fff;line-height:1.2}
.ph-badge{background:rgba(0,0,0,.25);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.ph-sub{font-size:10px;color:rgba(255,255,255,.6);line-height:1.3}
.info{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column}
.iname{font-size:13px;font-weight:700;margin-bottom:3px}
.idesc{font-size:11px;color:var(--mu);line-height:1.45;flex:1}
.itag{margin-top:8px;display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#edf7ed;color:var(--g);border:.5px solid #b0d8b0}
.hint{position:absolute;bottom:7px;right:10px;font-size:10px;color:rgba(0,0,0,.25)}
.back{transform:rotateY(180deg);display:flex;flex-direction:column;padding:16px 14px 12px;color:#fff}
.back.green{background:var(--g)}.back.blue{background:var(--b)}
.back-title{font-size:13px;font-weight:800;margin-bottom:7px;line-height:1.3}
.back-body{font-size:11px;line-height:1.6;flex:1;color:rgba(255,255,255,.9)}
.back-row{display:flex;gap:5px;margin-top:4px;font-size:11px;color:rgba(255,255,255,.8)}
.close-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:13px;font-family:inherit}
.action-btn{margin-top:10px;background:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.action-btn.green{color:var(--g)}.action-btn.blue{color:var(--b)}
.foot{background:var(--bk);color:rgba(255,255,255,.4);text-align:center;font-size:11px;padding:14px}
.foot strong{color:rgba(255,255,255,.7)}
@media(max-width:500px){.grid{grid-template-columns:1fr 1fr;gap:10px}.card{height:260px}.ph{height:130px}}
</style>
</head>

function icoSVG(type){
  var s = 'width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"';
  if(type==="phone") return '<svg '+s+'><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.12 1.18 2 2 0 012.1 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6z"/></svg>';
  if(type==="map")   return '<svg '+s+'><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
  if(type==="web")   return '<svg '+s+'><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>';
  if(type==="ig")    return '<svg '+s+'><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/></svg>';
  return '<svg '+s+'><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
}

function mkCard(item, uid){
  var wrap = document.createElement('div');
  wrap.className = 'card';
  wrap.id = uid;

  var inner = document.createElement('div');
  inner.className = 'card-in';

  // FRONT
  var front = document.createElement('div');
  front.className = 'front';

  var ph = document.createElement('div');
  ph.className = 'ph ' + item.c;
  ph.innerHTML = '<div class="ph-pre">'+item.pp+'</div>'
    + '<div class="ph-name">'+item.pn+'</div>'
    + '<div class="ph-badge">'+item.pb+'</div>'
    + (item.ps ? '<div class="ph-sub">'+item.ps+'</div>' : '');

  var info = document.createElement('div');
  info.className = 'info';
  info.innerHTML = '<div class="iname">'+item.n+'</div>'
    + '<div class="idesc">'+item.d+'</div>'
    + '<span class="itag">'+item.t+'</span>';

  var hint = document.createElement('div');
  hint.className = 'hint';
  hint.textContent = 'ver mas >';

  front.appendChild(ph);
  front.appendChild(info);
  front.appendChild(hint);

  // BACK
  var back = document.createElement('div');
  back.className = 'back ' + (item.c === 'blue' ? 'blue' : 'green');

  var closeBtn = document.createElement('button');
  closeBtn.className = 'close-btn';
  closeBtn.textContent = 'x';
  closeBtn.onclick = function(e){ e.stopPropagation(); wrap.classList.remove('flip'); };

  var bt = document.createElement('div');
  bt.className = 'back-title';
  bt.textContent = item.bt;

  var bb = document.createElement('div');
  bb.className = 'back-body';
  bb.textContent = item.bb;

  (item.br || []).forEach(function(r){
    var parts = r.split(':');
    var type = parts[0];
    var text = parts.slice(1).join(':');
    var row = document.createElement('div');
    row.className = 'back-row';
    row.innerHTML = icoSVG(type) + ' <span>'+text+'</span>';
    bb.appendChild(row);
  });

  back.appendChild(closeBtn);
  back.appendChild(bt);
  back.appendChild(bb);

  if(item.bn){
    var aBtn = document.createElement('button');
    aBtn.className = 'action-btn ' + (item.c === 'blue' ? 'blue' : 'green');
    aBtn.textContent = item.bn;
    aBtn.onclick = function(e){ e.stopPropagation(); window.open(item.bl,'_blank'); };
    back.appendChild(aBtn);
  }

  inner.appendChild(front);
  inner.appendChild(back);
  wrap.appendChild(inner);

  wrap.onclick = function(){ wrap.classList.toggle('flip'); };
  return wrap;
}

function render(secId){
  var page = document.getElementById('page');
  page.innerHTML = '';
  var toShow = secId === 'todos' ? D : D.filter(function(x){ return x.s === secId; });
  toShow.forEach(function(sec){
    var secDiv = document.createElement('div');
    secDiv.className = 'sec';
    var title = document.createElement('div');
    title.className = 'sec-t';
    title.textContent = sec.label;
    secDiv.appendChild(title);
    var grid = document.createElement('div');
    grid.className = 'grid';
    sec.items.forEach(function(item, i){
      grid.appendChild(mkCard(item, 'c-'+sec.s+'-'+i));
    });
    secDiv.appendChild(grid);
    page.appendChild(secDiv);
  });
}

document.getElementById('tabs').addEventListener('click', function(e){
  var btn = e.target.closest('.tab');
  if(!btn) return;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  btn.classList.add('on');
  render(btn.dataset.s);
});

render('todos');
</script>
