* { box-sizing: border-box; margin: 0; padding: 0; }
:root {

}
body { font-family:'Inter','Segoe UI',Arial,sans-serif; background:#f0f2f0; color:var(--tx); }

.hd { background:var(--g); padding:22px 28px 18px; }
.hd-in { max-width:1000px; margin:0 auto; display:flex; align-items:center; gap:16px; }
.hd-ic { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.4); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.hd h1 { font-size:19px; font-weight:800; color:#fff; letter-spacing:-.01em; }
.hd p  { font-size:12px; color:rgba(255,255,255,.7); margin-top:2px; }
.hd-st { height:4px; background:var(--bk); }

.tw { background:var(--bk); overflow-x:auto; scrollbar-width:none; position:sticky; top:0; z-index:10; }
.tw::-webkit-scrollbar { display:none; }
.tabs { max-width:1000px; margin:0 auto; display:flex; padding:0 16px; }
.tab { background:none; border:none; color:rgba(255,255,255,.5); font-family:inherit; font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:12px 16px; cursor:pointer; white-space:nowrap; border-bottom:3px solid transparent; transition:color .15s,border-color .15s; }
.tab:hover { color:rgba(255,255,255,.85); }
.tab.on { color:#fff; border-bottom-color:var(--gl); }

.page { max-width:1000px; margin:0 auto; padding:32px 16px 56px; }
.sec { margin-bottom:44px; }
.sec-t { font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--g); border-bottom:2px solid var(--g); padding-bottom:9px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
.sec-t svg { width:16px; height:16px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }

.fw { height:290px; perspective:900px; cursor:pointer; }
.fw:focus { outline:2px solid var(--g); outline-offset:3px; border-radius:var(--r); }
.fc { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .55s cubic-bezier(.4,0,.2,1); }
.fw.flipped .fc { transform:rotateY(180deg); }
.ff,.fb { position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; border-radius:var(--r); overflow:hidden; border:.5px solid var(--bd); }

.ff { background:#fff; display:flex; flex-direction:column; }
.fw:hover .ff { border-color:#aaa; box-shadow:0 6px 20px rgba(0,0,0,.1); }

.ph { width:100%; height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:14px; text-align:center; gap:5px; flex-shrink:0; }
.ph.green{background:#1e7e1e;} .ph.blue{background:#1560a0;}
.ph.terra{background:#7a3410;} .ph.teal{background:#0d6e6e;}
.ph.plum{background:#5a2d82;} .ph.navy{background:#1a2e5a;}
.ph-pre  { font-size:9px; color:rgba(255,255,255,.6); letter-spacing:.1em; text-transform:uppercase; }
.ph-name { font-size:13px; font-weight:800; color:#fff; line-height:1.2; }
.ph-badge{ background:rgba(0,0,0,.25); color:#fff; font-size:11px; font-weight:700; padding:3px 12px; border-radius:20px; }
.ph-sub  { font-size:10px; color:rgba(255,255,255,.6); line-height:1.3; }

.fi { padding:11px 13px 13px; flex:1; display:flex; flex-direction:column; }
.fn { font-size:13px; font-weight:700; color:var(--tx); margin-bottom:3px; line-height:1.25; }
.fd { font-size:11px; color:var(--mu); line-height:1.45; flex:1; }
.ft-tag { margin-top:8px; display:inline-block; font-size:10px; font-weight:700; letter-spacing:.04em; padding:3px 9px; border-radius:20px; background:var(--gb); color:var(--g); border:.5px solid #b0d8b0; }
.fh { position:absolute; bottom:8px; right:10px; font-size:10px; color:rgba(0,0,0,.28); font-weight:500; }

.fb { background:var(--g); transform:rotateY(180deg); display:flex; flex-direction:column; padding:18px 16px 14px; color:#fff; }
.fb.blue-back { background:#1560a0; }
.fb-t { font-size:13px; font-weight:800; color:#fff; margin-bottom:8px; line-height:1.3; }
.fb-b { font-size:11.5px; color:rgba(255,255,255,.88); line-height:1.6; flex:1; }
.fb-r { display:flex; gap:6px; margin-top:5px; align-items:flex-start; font-size:11.5px; color:rgba(255,255,255,.8); }
.fb-r svg { width:12px; height:12px; flex-shrink:0; margin-top:2px; opacity:.7; }
.fb-btn { margin-top:12px; background:#fff; border:none; border-radius:8px; padding:8px 14px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; display:flex; align-items:center; gap:5px; width:fit-content; }
.fb-btn.green-btn { color:var(--g); } .fb-btn.green-btn:hover { background:#e8f5e8; }
.fb-btn.blue-btn  { color:#1560a0; }  .fb-btn.blue-btn:hover  { background:#e8f0fb; }
.fb-x { position:absolute; top:9px; right:9px; background:rgba(255,255,255,.2); border:none; color:#fff; border-radius:50%; width:26px; height:26px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; font-family:inherit; }
.fb-x:hover { background:rgba(255,255,255,.35); }

.foot { background:var(--bk); color:rgba(255,255,255,.4); text-align:center; font-size:11px; padding:16px; }
.foot strong { color:rgba(255,255,255,.7); }

@media(max-width:480px){
  .grid { grid-template-columns:1fr 1fr; gap:10px; }
  .fw { height:270px; }
  .ph { height:132px; }
}
@media(max-width:340px){ .grid { grid-template-columns:1fr; } }
</style>

  const m={

  };

function mkCard(item, uid){
  const p = item.ph, b = item.back;
  const isBlue = item.color === "blue";
  const backClass = isBlue ? "fb blue-back" : "fb";
  const btnClass  = isBlue ? "fb-btn blue-btn" : "fb-btn green-btn";
  const ph = `<div class="ph ${item.color}">
    <div class="ph-pre">${p.pre}</div>
    <div class="ph-name">${p.name}</div>
    <div class="ph-badge">${p.badge}</div>
    ${p.sub ? `<div class="ph-sub">${p.sub}</div>` : ''}
  </div>`;
  const rows = (b.rows||[]).map(r=>`<div class="fb-r">${ico(r.i)}<span>${r.t}</span></div>`).join('');
  const btn = b.btn
    ? `<button class="${btnClass}" onclick="event.stopPropagation();${b.link?`window.open('${b.link}','_blank')`:''}">
        ${b.btn}
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
       </button>` : '';
  return `<div class="fw" id="${uid}" tabindex="0" role="button" aria-label="${item.name}"
     onclick="flip('${uid}')" onkeydown="if(event.key==='Enter'||event.key===' ')flip('${uid}')">
  <div class="fc">
    <div class="ff">
      ${ph}
      <div class="fi">
        <div class="fn">${item.name}</div>
        <div class="fd">${item.desc}</div>
        <span class="ft-tag">${item.tag}</span>
      </div>
      <div class="fh">ver más →</div>
    </div>
    <div class="${backClass}">
      <button class="fb-x" onclick="event.stopPropagation();unflip('${uid}')" aria-label="Cerrar">✕</button>
      <div class="fb-t">${b.title}</div>
      <div class="fb-b">${b.body}${rows}</div>
      ${btn}
    </div>
  </div>
</div>`;
}

function flip(id)   { document.getElementById(id).classList.add('flipped'); }
function unflip(id) { document.getElementById(id).classList.remove('flipped'); }

function render(secId){
  const page = document.getElementById('page');
  const toShow = secId === 'todos' ? S : S.filter(s=>s.id===secId);
  page.innerHTML = toShow.map(sec =>
    `<div class="sec">
      <div class="sec-t">${sec.icon}${sec.label}</div>
      <div class="grid">${sec.items.map((item,i)=>mkCard(item,`fc-${sec.id}-${i}`)).join('')}</div>
    </div>`
  ).join('');
}
